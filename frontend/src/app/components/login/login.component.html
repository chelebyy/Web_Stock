<!-- Matrix Efekt Arka Plan -->
<div style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  background-color: #0B0E18;
  overflow: hidden;
" #matrixContainer>
  <canvas #matrixCanvas style="
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.15;
  "></canvas>
</div>

<div style="
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  padding: 20px;
">
  <div style="
    background: rgba(23, 26, 33, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  ">
    <div style="
      text-align: center;
      margin-bottom: 2rem;
    ">
      <h2 style="
        color: #fff;
        text-shadow: 0 0 10px rgba(74, 158, 255, 0.8),
                     0 0 20px rgba(74, 158, 255, 0.8),
                     0 0 30px rgba(74, 158, 255, 0.8);
        margin-bottom: 0.5rem;
        font-size: 2rem;
        font-weight: 600;
      ">Hoş Geldiniz</h2>
    </div>
    
    <form (ngSubmit)="onSubmit()">
      <div style="margin-bottom: 1.5rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-id-card" style="color: rgba(255, 255, 255, 0.5); left: 1rem;"></i>
          <input 
            type="text" 
            pInputText
            id="sicil"
            [(ngModel)]="sicil"
            name="sicil"
            placeholder="Sicil Numarası"
            style="
              background: rgba(255, 255, 255, 0.1);
              border: 1px solid rgba(255, 255, 255, 0.2);
              border-radius: 8px;
              color: #ffffff;
              width: 100%;
              height: 45px;
              padding: 0.5rem 1rem;
              padding-left: 2.5rem;
              transition: all 0.3s ease;
            "
            required>
        </span>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-lock" style="color: rgba(255, 255, 255, 0.5); left: 1rem; z-index: 100;"></i>
          <p-password
            id="password"
            [(ngModel)]="password"
            name="password"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="Şifre"
            styleClass="w-full"
            [inputStyle]="{
              width:'100%', 
              'padding-left': '2.5rem', 
              'background': 'rgba(255, 255, 255, 0.1)', 
              'border': '1px solid rgba(255, 255, 255, 0.2)', 
              'color': '#ffffff', 
              'border-radius': '8px',
              'height': '45px'
            }"
          ></p-password>
        </span>
      </div>

      <div style="
        display: flex;
        align-items: center;
        margin-bottom: 1.5rem;
      ">
        <p-checkbox
          [(ngModel)]="rememberMe"
          name="rememberMe"
          [binary]="true"
          id="rememberMe"
          styleClass="glass-checkbox"
        ></p-checkbox>
        <label for="rememberMe" style="
          color: rgba(255, 255, 255, 0.7);
          margin-left: 0.5rem;
          cursor: pointer;
          font-size: 0.9rem;
        ">Beni Hatırla</label>
      </div>

      <div style="margin-top: 1rem;">
        <button 
          type="submit" 
          class="custom-gradient-button"
          style="
            background: linear-gradient(45deg, #4a9eff, #6d18ff) !important; 
            border: none !important; 
            color: white !important; 
            width: 100% !important; 
            height: 45px !important; 
            border-radius: 8px !important; 
            font-size: 1rem !important; 
            font-weight: 600 !important; 
            letter-spacing: 0.5px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
          "
        >
          <i class="pi pi-sign-in" style="margin-right: 8px !important;"></i>
          Giriş Yap
        </button>
      </div>
    </form>
  </div>
</div>

<p-toast position="top-right"></p-toast>
