<div class="dashboard-edit-container">
  <p-toast></p-toast>
  
  <div class="header">
    <div class="title">
      <h1>Dashboard Sayfası Düzenle</h1>
      <p>Dashboard sayfasının bilgilerini düzenleyin</p>
    </div>
    <div class="actions">
      <p-button label="Geri Dön" icon="pi pi-arrow-left" variant="outlined" severity="info" (onClick)="navigateBack()"></p-button>
    </div>
  </div>
  
  <div class="content" *ngIf="!loading; else loadingTemplate">
    <p-card styleClass="dashboard-edit-card">
      <form [formGroup]="dashboardForm" (ngSubmit)="saveDashboardPage()">
        <div class="form-grid">
          <!-- Sayfa Adı -->
          <div class="form-field">
            <label for="name" class="form-label">Sayfa Adı <span class="required-star">*</span></label>
            <input 
              id="name" 
              type="text" 
              pInputText 
              formControlName="name" 
              [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('name')}"
              placeholder="Sayfa adını girin"
            />
            <small *ngIf="isFieldInvalid('name')" class="error-message">
              {{ getErrorMessage('name') }}
            </small>
          </div>
          
          <!-- Açıklama -->
          <div class="form-field">
            <label for="description" class="form-label">Açıklama <span class="required-star">*</span></label>
            <textarea 
              id="description" 
              pTextarea 
              formControlName="description" 
              [rows]="5" 
              [autoResize]="true"
              [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('description')}"
              placeholder="Sayfa açıklamasını girin"
            ></textarea>
            <small *ngIf="isFieldInvalid('description')" class="error-message">
              {{ getErrorMessage('description') }}
            </small>
          </div>
          
          <!-- Rota -->
          <div class="form-field">
            <label for="route" class="form-label">Rota <span class="required-star">*</span></label>
            <input 
              id="route" 
              type="text" 
              pInputText 
              formControlName="route" 
              [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('route')}"
              placeholder="Sayfa rotasını girin (örn: /dashboard/admin)"
            />
            <small *ngIf="isFieldInvalid('route')" class="error-message">
              {{ getErrorMessage('route') }}
            </small>
          </div>
          
          <!-- Gerekli İzin -->
          <div class="form-field">
            <label for="requiredPermission" class="form-label">Gerekli İzin <span class="required-star">*</span></label>
            <p-dropdown 
              id="requiredPermission" 
              formControlName="requiredPermission" 
              [options]="permissionOptions" 
              optionLabel="label" 
              optionValue="value"
              placeholder="İzin seçin"
              [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('requiredPermission')}"
              [style]="{'width':'100%'}"
            ></p-dropdown>
            <small *ngIf="isFieldInvalid('requiredPermission')" class="error-message">
              {{ getErrorMessage('requiredPermission') }}
            </small>
          </div>
          
          <!-- Durum -->
          <div class="form-field status-field">
            <label for="isActive" class="form-label">Durum</label>
            <div class="status-toggle">
              <p-inputSwitch formControlName="isActive" inputId="isActive"></p-inputSwitch>
              <span class="status-label">{{ dashboardForm.get('isActive')?.value ? 'Aktif' : 'Pasif' }}</span>
            </div>
          </div>
        </div>
        
        <p-divider></p-divider>
        
        <div class="form-actions">
          <p-button 
            label="İptal" 
            icon="pi pi-times" 
            variant="outlined" 
            severity="secondary" 
            (onClick)="navigateBack()"
            [disabled]="saving"
          ></p-button>
          <p-button 
            label="Kaydet" 
            icon="pi pi-check" 
            type="submit" 
            severity="success" 
            [loading]="saving"
          ></p-button>
        </div>
      </form>
    </p-card>
  </div>
  
  <ng-template #loadingTemplate>
    <div class="loading-container">
      <div class="loading-content">
        <i class="pi pi-spin pi-spinner loading-icon"></i>
        <span>Yükleniyor...</span>
      </div>
    </div>
  </ng-template>
</div>
